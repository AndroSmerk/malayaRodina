<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Профиль — Малая Родина</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a href="/map/" class="topbar-logo">🌿 Малая Родина</a>
      <nav class="topbar-nav">
        <a href="/map/">Карта</a>
        <a href="/my-places/">Мои места</a>
        <a href="#" class="active">Профиль</a>
      </nav>
    </div>
    <div class="topbar-right">
      <div class="user-avatar" id="user-avatar">ИП</div>
    </div>
  </header>

  <div class="container">
    <div class="profile-header" id="profile-header"></div>
    <div class="stats-row" id="stats-row"></div>
    <div class="section-title">📝 Последние воспоминания</div>
    <div id="memories-list"></div>
  </div>

  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <h2>Редактировать профиль</h2>
      <form id="edit-form">
        <label>Имя <input type="text" id="edit-name" required></label>
        <label>О себе <textarea id="edit-bio" rows="3"></textarea></label>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="edit-cancel">Отмена</button>
          <button type="submit" class="btn-save">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
