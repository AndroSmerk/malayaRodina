<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Модерация — Малая Родина</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../place/style.css">
  <style>
    .mod-item {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #eef0f4;
    }
    .mod-item img {
      max-width: 200px;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .mod-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-approve {
      background: #e8f5e9;
      color: #2e7d32;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-reject {
      background: #ffebee;
      color: #c62828;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a href="/map/" class="topbar-logo">🌿 Малая Родина</a>
      <nav class="topbar-nav">
        <a href="/map/">Карта</a>
        <a href="/my-places/">Мои места</a>
        <a href="/profile/">Хроника</a>
        <a href="#" class="active">Модерация</a>
      </nav>
    </div>
    <div class="topbar-right">
      <div class="user-avatar" id="user-avatar">ИП</div>
    </div>
  </header>

  <div class="container">
    <h1>Модерация</h1>
    <div id="pending-memories"></div>
    <div id="pending-photos"></div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
