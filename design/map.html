<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Малая Родина — Карта</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f5f7fa;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Верхняя навигация */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: #fff;
      border-bottom: 1px solid #eef0f4;
      flex-shrink: 0;
      z-index: 1000;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .topbar-logo {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a2e;
      text-decoration: none;
    }

    .topbar-nav {
      display: flex;
      gap: 6px;
    }

    .topbar-nav a {
      text-decoration: none;
      color: #666;
      font-size: 14px;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
    }

    .topbar-nav a:hover,
    .topbar-nav a.active {
      background: #f0f4ff;
      color: #1a73e8;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-right .notification-btn {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: #f5f7fa;
      border: none;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      position: relative;
    }

    .topbar-right .notification-btn:hover {
      background: #e8ecf1;
    }

    .notification-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 18px;
      height: 18px;
      background: #e74c3c;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .user-avatar {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1a73e8, #0d47a1);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
    }

    /* Основной контейнер */
    .app-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Боковая панель */
    .sidebar {
      width: 380px;
      background: #fff;
      border-right: 1px solid #eef0f4;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid #eef0f4;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid #eef0f4;
    }

    .sidebar-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .sidebar-header .privacy-note {
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      padding: 10px 14px 10px 40px;
      border: 1.5px solid #e8ecf1;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      background: #f8f9fc;
      transition: border-color 0.2s, background 0.2s;
    }

    .search-wrap input:focus {
      border-color: #1a73e8;
      background: #fff;
    }

    .search-wrap .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 14px;
      pointer-events: none;
    }

    .places-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
    }

    .place-card {
      background: #f8f9fc;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .place-card:hover {
      background: #f0f4ff;
    }

    .place-card .pin {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .place-card .pin.village { background: #e8f5e9; }
    .place-card .pin.city { background: #e3f2fd; }
    .place-card .pin.house { background: #fff3e0; }

    .place-card .place-info {
      flex: 1;
      min-width: 0;
    }

    .place-card .place-name {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 2px;
    }

    .place-card .place-meta {
      font-size: 12px;
      color: #999;
      display: flex;
      gap: 12px;
    }

    .place-card .place-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: #bbb;
    }

    .empty-state .empty-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .empty-state .empty-text {
      font-size: 13px;
    }

    .add-place-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      margin: 8px 20px 16px;
      border: 2px dashed #d0d5de;
      border-radius: 12px;
      background: none;
      font-size: 14px;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .add-place-btn:hover {
      border-color: #1a73e8;
      color: #1a73e8;
      background: #f0f4ff;
    }

    /* Карта */
    .map-area {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Кнопка добавления места (плавающая) */
    .fab {
      position: absolute;
      bottom: 32px;
      right: 48px;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: #1a73e8;
      color: #fff;
      border: none;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(26,115,232,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fab:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(26,115,232,0.35);
    }

    /* Попап карточки места */
    .place-popup {
      min-width: 240px;
    }

    .place-popup h3 {
      font-size: 16px;
      margin-bottom: 4px;
    }

    .place-popup .address {
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
    }

    .place-popup .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 13px;
      color: #666;
    }

    .place-popup .stats span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .place-popup .actions {
      display: flex;
      gap: 8px;
    }

    .place-popup .actions button {
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
    }

    .place-popup .actions .btn-primary {
      background: #1a73e8;
      color: #fff;
    }

    .place-popup .actions .btn-secondary {
      background: #f0f4ff;
      color: #1a73e8;
    }
  </style>
</head>
<body>
  <!-- Верхняя панель -->
  <header class="topbar">
    <div class="topbar-left">
      <a href="#" class="topbar-logo">🌿 Малая Родина</a>
      <nav class="topbar-nav">
        <a href="#" class="active">Карта</a>
        <a href="#">Мои места</a>
        <a href="#">Хроника</a>
        <a href="#">Соседи</a>
      </nav>
    </div>
    <div class="topbar-right">
      <button class="notification-btn">
        🔔
        <span class="notification-badge">3</span>
      </button>
      <div class="user-avatar">ИП</div>
    </div>
  </header>

  <div class="app-layout">
    <!-- Боковая панель -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Поиск по названию...">
        </div>
      </div>

      <!-- Список мест -->
      <div class="places-scroll">
        <div class="place-card">
          <div class="pin house">🏠</div>
          <div class="place-info">
            <div class="place-name">ул. Центральная, д. 15</div>
            <div class="place-meta">
              <span>📍 Красная Пахра</span>
              <span>📸 8 фото</span>
              <span>👤 5 соседей</span>
            </div>
          </div>
        </div>

        <div class="empty-state">
          <div class="empty-icon">📍</div>
          <div class="empty-text">Добавьте ещё места, кликнув по карте</div>
        </div>
      </div>

      <button class="add-place-btn">+ Добавить место</button>
    </aside>

    <!-- Карта -->
    <div class="map-area">
      <div id="map"></div>
      <button class="fab" title="Добавить место">+</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', {
      center: [55.751244, 37.618423],
      zoom: 5,
      zoomControl: false,
    });

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap',
      maxZoom: 19,
    }).addTo(map);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // Маркер пользователя — виден только ему
    const userMarker = L.marker([55.415, 37.330]).addTo(map);
    userMarker.bindPopup(`
      <div class="place-popup">
        <h3>🏠 ул. Центральная, д. 15</h3>
        <div class="address">Красная Пахра, Московская область</div>
        <div class="stats">
          <span>📸 8 фото</span>
          <span>🎬 3 видео</span>
          <span>👤 5 соседей</span>
        </div>
        <div class="actions">
          <button class="btn-primary">Открыть</button>
          <button class="btn-secondary">Добавить воспоминание</button>
        </div>
      </div>
    `);

    setTimeout(() => userMarker.openPopup(), 500);
  </script>
</body>
</html>
