<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новое воспоминание — Малая Родина</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f5f7fa; color: #1a1a2e; }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; background: #fff; border-bottom: 1px solid #eef0f4;
    }
    .topbar-left { display: flex; align-items: center; gap: 32px; }
    .topbar-logo { font-size: 18px; font-weight: 700; color: #1a1a2e; text-decoration: none; }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .user-avatar {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, #1a73e8, #0d47a1); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 15px; cursor: pointer;
    }

    .container { max-width: 720px; margin: 0 auto; padding: 32px 24px; }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 14px; color: #666; text-decoration: none; margin-bottom: 24px;
    }
    .back-link:hover { color: #1a73e8; }

    .page-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
    .page-desc { font-size: 14px; color: #888; margin-bottom: 28px; }

    .form-card {
      background: #fff; border-radius: 16px; padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 20px;
    }
    .form-card h3 {
      font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #1a1a2e;
    }

    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px;
    }
    .form-group textarea {
      width: 100%; min-height: 160px; padding: 14px;
      border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 14px;
      font-family: inherit; outline: none; resize: vertical; background: #fafafa;
      line-height: 1.7;
    }
    .form-group textarea:focus {
      border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); background: #fff;
    }
    .form-group .char-count {
      text-align: right; font-size: 12px; color: #bbb; margin-top: 4px;
    }

    .form-row {
      display: flex; gap: 16px;
    }
    .form-row .form-group { flex: 1; }
    .form-group select, .form-group input[type="date"] {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 14px;
      font-family: inherit; outline: none; background: #fafafa;
    }
    .form-group select:focus, .form-group input[type="date"]:focus {
      border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); background: #fff;
    }

    /* Загрузка медиа */
    .upload-area {
      border: 2px dashed #d0d5de; border-radius: 12px; padding: 32px;
      text-align: center; cursor: pointer; transition: all 0.2s; background: #fafafa;
    }
    .upload-area:hover { border-color: #1a73e8; background: #f0f4ff; }
    .upload-area .upload-icon { font-size: 36px; margin-bottom: 8px; }
    .upload-area p { font-size: 14px; color: #888; }
    .upload-area .hint { font-size: 12px; color: #bbb; margin-top: 4px; }
    .upload-previews {
      display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap;
    }
    .upload-previews .preview-item {
      width: 100px; height: 100px; border-radius: 10px; background: #eef0f4;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; position: relative;
    }
    .upload-previews .preview-item .remove {
      position: absolute; top: -6px; right: -6px;
      width: 22px; height: 22px; border-radius: 50%; background: #e74c3c;
      color: #fff; border: none; font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .form-actions {
      display: flex; gap: 12px; margin-top: 24px;
    }
    .btn-primary {
      flex: 1; padding: 13px; background: #1a73e8; color: #fff; border: none;
      border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
      font-family: inherit;
    }
    .btn-primary:hover { background: #1557b0; }
    .btn-outline {
      padding: 13px 24px; background: none; color: #666; border: 1.5px solid #d0d5de;
      border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer;
      font-family: inherit;
    }
    .btn-outline:hover { background: #f5f7fa; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a href="map.html" class="topbar-logo">🌿 Малая Родина</a>
    </div>
    <div class="topbar-right">
      <div class="user-avatar">ИП</div>
    </div>
  </header>

  <div class="container">
    <a href="place.html" class="back-link">← ул. Центральная, д. 15</a>
    <div class="page-title">Новое воспоминание</div>
    <div class="page-desc">Запишите историю, прикрепите фото или видео</div>

    <form>
      <!-- Текст -->
      <div class="form-card">
        <h3>📝 Текст воспоминания</h3>
        <div class="form-group">
          <textarea placeholder="Напишите свою историю. Вспомните запахи, звуки, детали и эмоции...">Помню, как мы с ребятами после школы бежали к качелям. Они были старые, скрипучие, но мы их обожали. Дед сделал их ещё в 90-х из толстой цепи и деревянной доски. Сидеть на ней было больно, но мы подкладывали старые подушки.

Особенно любили качаться вечером, когда солнце садилось за огороды, и небо становилось оранжевым. Казалось, что качели достают до самого неба.

Один раз Витька так сильно раскачался, что перелетел через перекладину. Хорошо, что упал в крапиву — отделался парой ожогов и маминым выговором.</textarea>
          <div class="char-count">1 024 / 10 000</div>
        </div>
      </div>

      <!-- Дата и категория -->
      <div class="form-card">
        <div class="form-row">
          <div class="form-group">
            <label>📅 Дата события</label>
            <input type="date" value="2005-06-15">
          </div>
          <div class="form-group">
            <label>🏷 Категория</label>
            <select>
              <option>Детство</option>
              <option>Школа</option>
              <option>Лето</option>
              <option>Праздники</option>
              <option selected>Быт</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Фото -->
      <div class="form-card">
        <h3>📸 Фото</h3>
        <div class="upload-area">
          <div class="upload-icon">📸</div>
          <p>Нажмите, чтобы загрузить фото</p>
          <div class="hint">Форматы: JPG, PNG, WEBP. До 10 МБ</div>
        </div>
        <div class="upload-previews">
          <div class="preview-item">
            📸
            <button class="remove">×</button>
          </div>
          <div class="preview-item">
            📸
            <button class="remove">×</button>
          </div>
        </div>
      </div>

      <!-- Видео -->
      <div class="form-card">
        <h3>🎬 Видео</h3>
        <div class="upload-area">
          <div class="upload-icon">🎬</div>
          <p>Нажмите, чтобы загрузить видео</p>
          <div class="hint">До 60 секунд. Не более 50 МБ</div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">Сохранить воспоминание</button>
        <button type="button" class="btn-outline">Отмена</button>
      </div>
    </form>
  </div>


</body>
</html>
