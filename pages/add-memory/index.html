<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новое воспоминание — Малая Родина</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a href="../map/index.html" class="topbar-logo">🌿 Малая Родина</a>
    </div>
    <div class="topbar-right">
      <div class="user-avatar" id="user-avatar">ИП</div>
    </div>
  </header>

  <div class="container">
    <a href="#" class="back-link" id="back-link">← Назад</a>
    <div class="page-title">Новое воспоминание</div>
    <div class="page-desc">Запишите историю, прикрепите фото или видео</div>

    <form id="memory-form">
      <div class="form-card">
        <h3>📝 Текст воспоминания</h3>
        <div class="form-group">
          <textarea id="memory-text" placeholder="Напишите свою историю. Вспомните запахи, звуки, детали и эмоции..."></textarea>
          <div class="char-count"><span id="char-count">0</span> / 10 000</div>
        </div>
      </div>

      <div class="form-card">
        <div class="form-row">
          <div class="form-group">
            <label>📅 Дата события</label>
            <input type="date" id="memory-date">
          </div>
          <div class="form-group">
            <label>🏷 Категория</label>
            <select id="memory-category">
              <option>Детство</option>
              <option>Школа</option>
              <option>Лето</option>
              <option>Праздники</option>
              <option>Быт</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-card">
        <h3>📸 Фото</h3>
        <div class="upload-area" id="photo-upload">
          <div class="upload-icon">📸</div>
          <p>Нажмите, чтобы загрузить фото</p>
          <div class="hint">Форматы: JPG, PNG, WEBP. До 10 МБ</div>
        </div>
        <div class="upload-previews" id="photo-previews"></div>
      </div>

      <div class="form-card">
        <h3>🎬 Видео</h3>
        <div class="upload-area" id="video-upload">
          <div class="upload-icon">🎬</div>
          <p>Нажмите, чтобы загрузить видео</p>
          <div class="hint">До 60 секунд. Не более 50 МБ</div>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn-primary">Сохранить воспоминание</button>
        <button type="button" class="btn-outline" id="cancel-btn">Отмена</button>
      </div>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
