<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Семейный круг — Малая Родина</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a href="../map/index.html" class="topbar-logo">🌿 Малая Родина</a>
    </div>
    <div class="topbar-right">
      <div class="user-avatar" id="user-avatar">ИП</div>
    </div>
  </header>

  <div class="container">
    <a href="../map/index.html" class="back-link">← На карту</a>

    <div class="page-header">
      <h1>👨‍👩‍👧‍👧 Семейный круг</h1>
      <p class="page-desc">Добавьте родственников — они смогут видеть ваши воспоминания, отмеченные как «Семейный круг»</p>
    </div>

    <div class="add-form" id="add-form">
      <h3>Добавить родственника</h3>
      <div class="form-group">
        <label>Email родственника</label>
        <input type="email" id="relative-email" placeholder="email@example.com">
      </div>
      <div class="form-actions">
        <button class="btn-primary" id="add-relative">Добавить</button>
      </div>
      <div class="form-error" id="form-error"></div>
    </div>

    <div id="family-list"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
