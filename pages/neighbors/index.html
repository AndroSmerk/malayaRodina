<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Соседи — Малая Родина</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <a href="../map/index.html" class="topbar-logo">🌿 Малая Родина</a>
      <nav class="topbar-nav">
        <a href="../map/index.html">Карта</a>
        <a href="../my-places/index.html">Мои места</a>
        <a href="../profile/index.html">Хроника</a>
        <a href="#" class="active">Соседи</a>
      </nav>
    </div>
    <div class="topbar-right">
      <div class="user-avatar" id="user-avatar">ИП</div>
    </div>
  </header>

  <div class="container">
    <a href="#" class="back-link" id="back-link">← Назад</a>

    <div class="page-header">
      <div>
        <h1>👥 Соседи</h1>
        <div class="place-ref" id="place-ref">Загрузка...</div>
      </div>
      <button class="btn-primary" id="show-add-form">+ Добавить жителя</button>
    </div>

    <div class="add-form" id="add-form">
      <h3>Новый житель</h3>
      <div class="form-group">
        <label>ФИО</label>
        <input type="text" id="neighbor-name" placeholder="Иванова Валентина Степановна">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Роль</label>
          <select id="neighbor-role">
            <option>Сосед(ка)</option>
            <option>Друг детства</option>
            <option>Родственник</option>
            <option>Другой</option>
          </select>
        </div>
        <div class="form-group">
          <label>Период проживания</label>
          <input type="text" id="neighbor-period" placeholder="1985–2005">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-submit" id="save-neighbor">Сохранить</button>
        <button class="btn-cancel" id="hide-add-form">Отмена</button>
      </div>
    </div>

    <div id="neighbors-list"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
